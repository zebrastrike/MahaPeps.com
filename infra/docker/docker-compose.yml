version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: sh -c "npm run start:dev"
    environment:
      NODE_ENV: ${API_NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-maha_dev}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ../../apps/backend:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    command: sh -c "npm run dev"
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-development}
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    volumes:
      - ../../apps/frontend:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-maha_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
