version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: sh -c "npm run start:dev"
    environment:
      NODE_ENV: ${API_NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-maha_dev}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MAILHOG_HOST: ${MAILHOG_HOST:-mailhog}
      MAILHOG_PORT: ${MAILHOG_SMTP_PORT:-1025}
    volumes:
      - ../../apps/backend:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    depends_on:
      - postgres
      - redis
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    command: sh -c "npm run dev"
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-development}
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${NGINX_PORT:-8080}/api}
    volumes:
      - ../../apps/frontend:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-maha_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_HTTP_PORT:-8025}:8025"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
